<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Overlay</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:black;
font-family:Arial;
color:white;
}

.card{
background:#111;
padding:30px;
border-radius:18px;
width:320px;
box-shadow:0 0 30px rgba(0,0,0,.6);
}

.row{
display:flex;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,.08);
font-size:18px;
}

.nextTitle{
text-align:center;
margin-top:20px;
opacity:.7;
}

.nextName{
text-align:center;
font-size:26px;
margin-top:4px;
}

.countdown{
text-align:center;
font-size:34px;
font-weight:bold;
margin-top:8px;
}
</style>

</head>

<body>

<div class="card">

<div class="row"><span>Fajr</span><span id="fajr">--</span></div>
<div class="row"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="row"><span>Asr</span><span id="asr">--</span></div>
<div class="row"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="row"><span>Isha</span><span id="isha">--</span></div>

<div class="nextTitle">Next Prayer</div>
<div class="nextName" id="nextPrayer">--</div>
<div class="countdown" id="countdown">00:00:00</div>

</div>

<script>

async function load(){

let res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=8");

let data = await res.json();

let t = data.data.timings;

set("fajr",t.Fajr);
set("dhuhr",t.Dhuhr);
set("asr",t.Asr);
set("maghrib",t.Maghrib);
set("isha",t.Isha);

nextPrayer(t);

}

function set(id,time){

time=time.split(" ")[0];

let p=time.split(":");

let h=parseInt(p[0]);
let m=p[1];

let ampm=h>=12?"PM":"AM";

h=h%12;
if(h==0)h=12;

document.getElementById(id).innerText=h+":"+m+" "+ampm;

}

function nextPrayer(t){

let now=new Date();

let prayers=[
["Fajr",t.Fajr],
["Dhuhr",t.Dhuhr],
["Asr",t.Asr],
["Maghrib",t.Maghrib],
["Isha",t.Isha]
];

let next;

for(let p of prayers){

let parts=p[1].split(":");

let d=new Date();

d.setHours(parts[0]);
d.setMinutes(parts[1]);
d.setSeconds(0);

if(d>now){
next={name:p[0],time:d};
break;
}

}

if(!next){

let parts=t.Fajr.split(":");

let d=new Date();
d.setDate(d.getDate()+1);
d.setHours(parts[0]);
d.setMinutes(parts[1]);

next={name:"Fajr",time:d};

}

document.getElementById("nextPrayer").innerText=next.name;

setInterval(()=>{

let diff=next.time-new Date();

let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("countdown").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

},1000);

}

load();

</script>

</body>
</html>
