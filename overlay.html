<script>

async function loadTimes(){

let position = await new Promise((resolve,reject)=>{
navigator.geolocation.getCurrentPosition(resolve,reject);
});

let lat = position.coords.latitude;
let lon = position.coords.longitude;

let url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=8&school=1`;

let res = await fetch(url);
let data = await res.json();

let t = data.data.timings;

document.getElementById("fajr").innerText=format(t.Fajr);
document.getElementById("dhuhr").innerText=format(t.Dhuhr);
document.getElementById("asr").innerText=format(t.Asr);
document.getElementById("maghrib").innerText=format(t.Maghrib);
document.getElementById("isha").innerText=format(t.Isha);

calculateNext(t);

}

function format(time){

time = time.split(" ")[0];

let parts=time.split(":");
let h=parseInt(parts[0]);
let m=parts[1];

let ampm=h>=12?"PM":"AM";

h=h%12;
if(h==0)h=12;

return h+":"+m+" "+ampm;

}

function calculateNext(t){

let now=new Date();

let prayers=[
{name:"Fajr",time:t.Fajr},
{name:"Dhuhr",time:t.Dhuhr},
{name:"Asr",time:t.Asr},
{name:"Maghrib",time:t.Maghrib},
{name:"Isha",time:t.Isha}
];

let next=null;

for(let p of prayers){

let parts=p.time.split(":");

let d=new Date();

d.setHours(parts[0]);
d.setMinutes(parts[1]);
d.setSeconds(0);

if(d>now){

next={name:p.name,time:d};
break;

}

}

if(!next){

let parts=prayers[0].time.split(":");

let d=new Date();

d.setDate(d.getDate()+1);
d.setHours(parts[0]);
d.setMinutes(parts[1]);
d.setSeconds(0);

next={name:"Fajr",time:d};

}

document.getElementById("nextPrayer").innerText=next.name;

setInterval(()=>{

let diff=next.time-new Date();

let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("countdown").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

},1000);

}

loadTimes();

</script>
