<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Overlay</title>

<style>
body{
margin:0;
background:transparent;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.widget{
position:fixed;
bottom:40px;
right:40px;
font-size:20px;
line-height:1.8;
text-shadow:0 0 10px black;
}

.next{
margin-top:10px;
font-size:26px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="widget">

<div>Fajr: <span id="fajr">--</span></div>
<div>Dhuhr: <span id="dhuhr">--</span></div>
<div>Asr: <span id="asr">--</span></div>
<div>Maghrib: <span id="maghrib">--</span></div>
<div>Isha: <span id="isha">--</span></div>

<div class="next">
Next: <span id="nextPrayer">--</span><br>
<span id="countdown">00:00:00</span>
</div>

</div>

<script>

async function loadPrayerTimes(){

let res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=4");
let data = await res.json();

let t = data.data.timings;

document.getElementById("fajr").innerText = t.Fajr;
document.getElementById("dhuhr").innerText = t.Dhuhr;
document.getElementById("asr").innerText = t.Asr;
document.getElementById("maghrib").innerText = t.Maghrib;
document.getElementById("isha").innerText = t.Isha;

calculateNext(t);

}

function calculateNext(t){

let now = new Date();

let prayers = [
{name:"Fajr",time:t.Fajr},
{name:"Dhuhr",time:t.Dhuhr},
{name:"Asr",time:t.Asr},
{name:"Maghrib",time:t.Maghrib},
{name:"Isha",time:t.Isha}
];

let next=null;

for(let p of prayers){

let parts=p.time.split(":");
let d=new Date();
d.setHours(parts[0]);
d.setMinutes(parts[1]);
d.setSeconds(0);

if(d>now){
next={name:p.name,time:d};
break;
}

}

if(!next){
let parts=prayers[0].time.split(":");
let d=new Date();
d.setDate(d.getDate()+1);
d.setHours(parts[0]);
d.setMinutes(parts[1]);
d.setSeconds(0);

next={name:"Fajr",time:d};
}

document.getElementById("nextPrayer").innerText=next.name;

setInterval(()=>{

let diff=next.time-new Date();

let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

document.getElementById("countdown").innerText=
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0");

},1000)

}

loadPrayerTimes();

</script>

</body>
</html>
