<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Overlay</title>

<style>

body{
background:transparent;
color:white;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.widget{
width:260px;
}

.prayer{
display:flex;
justify-content:space-between;
padding:6px 0;
font-size:18px;
}

.next{
text-align:center;
margin-top:15px;
}

.nextname{
font-size:22px;
margin-top:4px;
}

.countdown{
font-size:32px;
font-weight:bold;
margin-top:4px;
}

</style>
</head>

<body>

<div class="widget">

<div class="prayer"><span>Fajr</span><span id="fajr">--</span></div>
<div class="prayer"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="prayer"><span>Asr</span><span id="asr">--</span></div>
<div class="prayer"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="prayer"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
<div>Next Prayer</div>
<div class="nextname" id="nextPrayer">--</div>
<div class="countdown" id="countdown">00:00:00</div>
</div>

</div>

<script>

function formatTime(time){
const parts = time.split(":");
let h = parseInt(parts[0]);
let m = parts[1];

let ampm = h >= 12 ? "PM" : "AM";

h = h % 12;
h = h ? h : 12;

return h + ":" + m + " " + ampm;
}

async function loadPrayerTimes(){

const response = await fetch("dubai_prayer_times.json");
const data = await response.json();

const today = new Date().getDate();
const t = data[today];

document.getElementById("fajr").textContent = formatTime(t.Fajr);
document.getElementById("dhuhr").textContent = formatTime(t.Dhuhr);
document.getElementById("asr").textContent = formatTime(t.Asr);
document.getElementById("maghrib").textContent = formatTime(t.Maghrib);
document.getElementById("isha").textContent = formatTime(t.Isha);

startCountdown(t);

}

function startCountdown(prayers){

const list = [
["Fajr", prayers.Fajr],
["Dhuhr", prayers.Dhuhr],
["Asr", prayers.Asr],
["Maghrib", prayers.Maghrib],
["Isha", prayers.Isha]
];

setInterval(()=>{

const now = new Date();
let nextTime = null;
let nextName = "";

for(const p of list){

const parts = p[1].split(":");
const prayer = new Date();

prayer.setHours(parts[0],parts[1],0,0);

if(prayer > now){
nextTime = prayer;
nextName = p[0];
break;
}

}

if(!nextTime){

const parts = list[0][1].split(":");
nextTime = new Date();

nextTime.setDate(nextTime.getDate()+1);
nextTime.setHours(parts[0],parts[1],0,0);

nextName = "Fajr";

}

document.getElementById("nextPrayer").textContent = nextName;

const diff = nextTime - now;

const h = Math.floor(diff/1000/60/60);
const m = Math.floor(diff/1000/60)%60;
const s = Math.floor(diff/1000)%60;

document.getElementById("countdown").textContent =
String(h).padStart(2,'0') + ":" +
String(m).padStart(2,'0') + ":" +
String(s).padStart(2,'0');

},1000)

}

loadPrayerTimes();

</script>

</body>
</html>
