<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubai Prayer Times</title>

<style>

body{
background:#000;
color:#fff;
font-family:Segoe UI,Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
font-size:26px;
border-bottom:1px solid #333;
}

.next{
margin-top:30px;
text-align:center;
}

.countdown{
font-size:42px;
color:#00d0ff;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="row"><span>Fajr</span><span id="fajr">--</span></div>
<div class="row"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="row"><span>Asr</span><span id="asr">--</span></div>
<div class="row"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="row"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
<div id="nextPrayer">Next Prayer</div>
<div class="countdown" id="countdown">00:00:00</div>
</div>

</div>

<script>

function pad(n){
return n.toString().padStart(2,'0');
}

async function loadPrayerTimes(){

const url =
"https://api.aladhan.com/v1/timings?latitude=25.2048&longitude=55.2708&method=8&timezone=Asia/Dubai";

const response = await fetch(url);
const data = await response.json();
const t = data.data.timings;

const prayers = {
Fajr:t.Fajr,
Dhuhr:t.Dhuhr,
Asr:t.Asr,
Maghrib:t.Maghrib,
Isha:t.Isha
};

document.getElementById("fajr").textContent = prayers.Fajr;
document.getElementById("dhuhr").textContent = prayers.Dhuhr;
document.getElementById("asr").textContent = prayers.Asr;
document.getElementById("maghrib").textContent = prayers.Maghrib;
document.getElementById("isha").textContent = prayers.Isha;

startCountdown(prayers);

}

function startCountdown(prayers){

setInterval(()=>{

const now = new Date();

const prayerList = [
["Fajr",prayers.Fajr],
["Dhuhr",prayers.Dhuhr],
["Asr",prayers.Asr],
["Maghrib",prayers.Maghrib],
["Isha",prayers.Isha]
];

let nextName="";
let nextTime=null;

for(const p of prayerList){

const name = p[0];
const time = p[1];

const [h,m] = time.split(":");

const prayerDate = new Date();
prayerDate.setHours(h,m,0,0);

if(prayerDate > now){

nextName = name;
nextTime = prayerDate;
break;

}

}

if(!nextTime){

const [h,m] = prayerList[0][1].split(":");

nextTime = new Date();
nextTime.setDate(nextTime.getDate()+1);
nextTime.setHours(h,m,0,0);

nextName = "Fajr";

}

document.getElementById("nextPrayer").textContent = "Next: " + nextName;

const diff = nextTime - now;

const h = Math.floor(diff/1000/60/60);
const m = Math.floor(diff/1000/60)%60;
const s = Math.floor(diff/1000)%60;

document.getElementById("countdown").textContent =
pad(h)+":"+pad(m)+":"+pad(s);

},1000);

}

loadPrayerTimes();

</script>

</body>
</html>
