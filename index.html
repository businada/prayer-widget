<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubai Prayer Times</title>

<style>
body{
background:black;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:26px;
border-bottom:1px solid #333;
}

.next{
margin-top:25px;
text-align:center;
}

.countdown{
font-size:40px;
margin-top:10px;
color:#3ddcff;
}
</style>

</head>

<body>

<div class="container">

<div class="row"><span>Fajr</span><span id="fajr">--</span></div>
<div class="row"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="row"><span>Asr</span><span id="asr">--</span></div>
<div class="row"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="row"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
<div id="nextPrayer">Next Prayer</div>
<div class="countdown" id="countdown">--:--:--</div>
</div>

</div>

<script>

let prayers=[];

async function loadPrayerTimes(){

let res=await fetch("https://api.aladhan.com/v1/timings?latitude=25.2048&longitude=55.2708&method=4&timezone=Asia/Dubai");
let data=await res.json();
let t=data.data.timings;

document.getElementById("fajr").innerText=t.Fajr;
document.getElementById("dhuhr").innerText=t.Dhuhr;
document.getElementById("asr").innerText=t.Asr;
document.getElementById("maghrib").innerText=t.Maghrib;
document.getElementById("isha").innerText=t.Isha;

prayers=[
["Fajr",t.Fajr],
["Dhuhr",t.Dhuhr],
["Asr",t.Asr],
["Maghrib",t.Maghrib],
["Isha",t.Isha]
];

startCountdown();

}

function startCountdown(){

setInterval(()=>{

let now=new Date();

let nextName="";
let nextTime=null;

for(let p of prayers){

let [name,time]=p;

let [h,m]=time.split(":");

let prayer=new Date();
prayer.setHours(h,m,0);

if(prayer>now){

nextName=name;
nextTime=prayer;
break;

}

}

if(!nextTime){

let [h,m]=prayers[0][1].split(":");

nextTime=new Date();
nextTime.setDate(nextTime.getDate()+1);
nextTime.setHours(h,m,0);

nextName="Fajr";

}

document.getElementById("nextPrayer").innerText="Next: "+nextName;

let diff=nextTime-now;

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=`${h}:${m}:${s}`;

},1000);

}

loadPrayerTimes();

</script>
</body>
</html>
