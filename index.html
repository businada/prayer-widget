<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Widget</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:transparent;
color:white;
}

.widget{
width:220px;
padding:15px;
border-radius:12px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
}

.title{
font-size:16px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.prayer{
display:flex;
justify-content:space-between;
margin:4px 0;
font-size:14px;
}

.next{
margin-top:10px;
text-align:center;
font-size:14px;
color:#00e5ff;
}
</style>
</head>

<body>

<div class="widget">
<div class="title" id="location">Dubai</div>

<div class="prayer"><span>Fajr</span><span id="fajr">--</span></div>
<div class="prayer"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="prayer"><span>Asr</span><span id="asr">--</span></div>
<div class="prayer"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="prayer"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
Next Prayer<br>
<span id="countdown">00:00:00</span>
</div>

</div>

<script>

let prayers = {};
let nextPrayer = "";

function formatTime(time){
let [h,m] = time.split(":");
let hour = parseInt(h);
let ampm = hour >= 12 ? "PM" : "AM";
hour = hour % 12;
hour = hour ? hour : 12;
return hour + ":" + m + " " + ampm;
}

async function loadPrayerTimes(){

let res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=4");
let data = await res.json();

let t = data.data.timings;

prayers = {
Fajr:t.Fajr,
Dhuhr:t.Dhuhr,
Asr:t.Asr,
Maghrib:t.Maghrib,
Isha:t.Isha
};

document.getElementById("fajr").innerText=formatTime(t.Fajr);
document.getElementById("dhuhr").innerText=formatTime(t.Dhuhr);
document.getElementById("asr").innerText=formatTime(t.Asr);
document.getElementById("maghrib").innerText=formatTime(t.Maghrib);
document.getElementById("isha").innerText=formatTime(t.Isha);

}

function updateCountdown(){

let now = new Date();
let current = now.getHours()*60 + now.getMinutes();

let prayerTimes = [
["Fajr",prayers.Fajr],
["Dhuhr",prayers.Dhuhr],
["Asr",prayers.Asr],
["Maghrib",prayers.Maghrib],
["Isha",prayers.Isha]
];

for(let p of prayerTimes){

let [h,m]=p[1].split(":");
let minutes=parseInt(h)*60+parseInt(m);

if(minutes>current){

nextPrayer=p[0];

let target=new Date();
target.setHours(h);
target.setMinutes(m);
target.setSeconds(0);

let diff=target-now;

let h2=Math.floor(diff/1000/60/60);
let m2=Math.floor(diff/1000/60)%60;
let s2=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
h2.toString().padStart(2,"0")+":"+
m2.toString().padStart(2,"0")+":"+
s2.toString().padStart(2,"0");

return;
}
}

}

loadPrayerTimes();

setInterval(updateCountdown,1000);

</script>

</body>
</html>
