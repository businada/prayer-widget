<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubai Prayer Times</title>

<style>
body{
background:black;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:420px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
font-size:26px;
border-bottom:1px solid #333;
}

.next{
margin-top:30px;
text-align:center;
}

.countdown{
font-size:40px;
color:#00d0ff;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<div class="row"><span>Fajr</span><span id="fajr">--</span></div>
<div class="row"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="row"><span>Asr</span><span id="asr">--</span></div>
<div class="row"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="row"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
<div id="nextPrayer">Next Prayer</div>
<div class="countdown" id="countdown">--:--:--</div>
</div>

</div>

<script>

async function loadTimes(){

const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=4");
const data = await res.json();

const t = data.data.timings;

document.getElementById("fajr").textContent = t.Fajr;
document.getElementById("dhuhr").textContent = t.Dhuhr;
document.getElementById("asr").textContent = t.Asr;
document.getElementById("maghrib").textContent = t.Maghrib;
document.getElementById("isha").textContent = t.Isha;

startCountdown(t);

}

function startCountdown(times){

setInterval(()=>{

let now = new Date();

let prayers = [
["Fajr",times.Fajr],
["Dhuhr",times.Dhuhr],
["Asr",times.Asr],
["Maghrib",times.Maghrib],
["Isha",times.Isha]
];

let nextName="";
let nextTime=null;

for(let p of prayers){

let name=p[0];
let time=p[1];

let [h,m]=time.split(":");

let prayer=new Date();
prayer.setHours(h,m,0);

if(prayer>now){
nextName=name;
nextTime=prayer;
break;
}

}

if(!nextTime){

let [h,m]=prayers[0][1].split(":");

nextTime=new Date();
nextTime.setDate(nextTime.getDate()+1);
nextTime.setHours(h,m,0);

nextName="Fajr";

}

document.getElementById("nextPrayer").innerText="Next: "+nextName;

let diff=nextTime-now;

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
`${h}:${m}:${s}`;

},1000);

}

loadTimes();

</script>

</body>
</html>
