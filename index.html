<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Businada Prayer Widget</title>

<style>
body{
background:#000;
color:#fff;
font-family:Segoe UI;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:420px;
}

.row{
display:flex;
justify-content:space-between;
padding:10px 0;
font-size:24px;
border-bottom:1px solid #333;
}

.next{
margin-top:25px;
text-align:center;
}

.countdown{
font-size:36px;
color:#3ddcff;
margin-top:10px;
}
</style>

</head>
<body>

<div class="container">

<div class="row"><span>Fajr</span><span id="fajr">--</span></div>
<div class="row"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="row"><span>Asr</span><span id="asr">--</span></div>
<div class="row"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="row"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
<div id="nextName"></div>
<div class="countdown" id="countdown"></div>
</div>

</div>

<script>

let prayers = {};

async function loadTimes(){

let url = "https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=4";

let res = await fetch(url);
let data = await res.json();
let t = data.data.timings;

prayers = {
Fajr:t.Fajr,
Dhuhr:t.Dhuhr,
Asr:t.Asr,
Maghrib:t.Maghrib,
Isha:t.Isha
};

document.getElementById("fajr").innerText=t.Fajr;
document.getElementById("dhuhr").innerText=t.Dhuhr;
document.getElementById("asr").innerText=t.Asr;
document.getElementById("maghrib").innerText=t.Maghrib;
document.getElementById("isha").innerText=t.Isha;

}

function parseTime(timeStr){

let date = new Date();
let [time,modifier] = timeStr.split(" ");

let [hours,minutes] = time.split(":");

if(modifier === "PM" && hours != 12){
hours = parseInt(hours) + 12;
}

if(modifier === "AM" && hours == 12){
hours = 0;
}

date.setHours(hours);
date.setMinutes(minutes);
date.setSeconds(0);

return date;

}

function getNextPrayer(){

let now = new Date();

for(let name in prayers){

let prayerTime = parseTime(prayers[name]);

if(prayerTime > now){
return {name, prayerTime};
}

}

}

function startCountdown(){

setInterval(()=>{

let next = getNextPrayer();

if(!next) return;

document.getElementById("nextPrayer").innerText = next.name;

let diff = next.prayerTime - new Date();

let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60)%60;
let s = Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText =
`${h}:${m}:${s}`;

},1000);

}

loadTimes().then(startCountdown);

</script>
</body>
</html>
