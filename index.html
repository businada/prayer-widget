<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Widget</title>

<style>

body{
    background:#000;
    color:white;
    font-family:Arial;
    text-align:center;
}

.widget{
    width:260px;
    margin:auto;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    font-size:18px;
}

.next{
    margin-top:15px;
    font-size:20px;
}

.count{
    font-size:28px;
    margin-top:5px;
}

</style>
</head>

<body>

<div class="widget">

<div class="row"><span>Fajr</span><span id="fajr">--</span></div>
<div class="row"><span>Dhuhr</span><span id="dhuhr">--</span></div>
<div class="row"><span>Asr</span><span id="asr">--</span></div>
<div class="row"><span>Maghrib</span><span id="maghrib">--</span></div>
<div class="row"><span>Isha</span><span id="isha">--</span></div>

<div class="next">
Next Prayer
<div class="count" id="countdown">00:00:00</div>
</div>

</div>

<script>

function formatTime24to12(time){

const [h,m] = time.split(":");
let hour = parseInt(h);
let ampm = hour >= 12 ? "PM":"AM";

hour = hour % 12;
hour = hour ? hour : 12;

return hour + ":" + m + " " + ampm;

}

async function loadPrayerTimes(){

const response = await fetch("dubai_prayer_times.json");
const timetable = await response.json();

const today = new Date().getDate();
const t = timetable[today];

document.getElementById("fajr").textContent = formatTime24to12(t.Fajr);
document.getElementById("dhuhr").textContent = formatTime24to12(t.Dhuhr);
document.getElementById("asr").textContent = formatTime24to12(t.Asr);
document.getElementById("maghrib").textContent = formatTime24to12(t.Maghrib);
document.getElementById("isha").textContent = formatTime24to12(t.Isha);

startCountdown(t);

}

function startCountdown(prayers){

setInterval(()=>{

const now = new Date();

const list = [
["Fajr",prayers.Fajr],
["Dhuhr",prayers.Dhuhr],
["Asr",prayers.Asr],
["Maghrib",prayers.Maghrib],
["Isha",prayers.Isha]
];

let nextTime=null;

for(const p of list){

const [h,m] = p[1].split(":");
const prayer = new Date();

prayer.setHours(h,m,0,0);

if(prayer > now){
nextTime = prayer;
break;
}

}

if(!nextTime){

const [h,m] = list[0][1].split(":");
nextTime = new Date();
nextTime.setDate(nextTime.getDate()+1);
nextTime.setHours(h,m,0,0);

}

const diff = nextTime - now;

const h = Math.floor(diff/1000/60/60);
const m = Math.floor(diff/1000/60)%60;
const s = Math.floor(diff/1000)%60;

document.getElementById("countdown").textContent =
String(h).padStart(2,'0') + ":" +
String(m).padStart(2,'0') + ":" +
String(s).padStart(2,'0');

},1000)

}

loadPrayerTimes();

</script>

</body>
</html>
