<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubai Prayer Widget</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Segoe UI;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.location{
position:absolute;
top:20px;
font-size:18px;
opacity:0.7;
}

.container{
display:flex;
gap:120px;
}

.prayer{
text-align:center;
}

.name{
font-size:28px;
opacity:0.7;
}

.time{
font-size:60px;
font-weight:bold;
}

.next{
margin-top:70px;
text-align:center;
}

.countdown{
font-size:50px;
color:#00e5ff;
font-weight:bold;
}

</style>

</head>

<body>

<div class="location">Dubai</div>

<div class="container">

<div class="prayer">
<div class="name">Fajr</div>
<div class="time" id="fajr">--</div>
</div>

<div class="prayer">
<div class="name">Dhuhr</div>
<div class="time" id="dhuhr">--</div>
</div>

<div class="prayer">
<div class="name">Asr</div>
<div class="time" id="asr">--</div>
</div>

<div class="prayer">
<div class="name">Maghrib</div>
<div class="time" id="maghrib">--</div>
</div>

<div class="prayer">
<div class="name">Isha</div>
<div class="time" id="isha">--</div>
</div>

</div>

<div class="next">
<div>Next Prayer</div>
<div id="nextname">--</div>
<div class="countdown" id="countdown">00:00:00</div>
</div>

<script>

let prayers=[]
let nextPrayerTime=null

async function loadTimes(){

let res=await fetch("dubai_prayer_times.json")
let data=await res.json()

let t=data.today

document.getElementById("fajr").innerText=t.Fajr
document.getElementById("dhuhr").innerText=t.Dhuhr
document.getElementById("asr").innerText=t.Asr
document.getElementById("maghrib").innerText=t.Maghrib
document.getElementById("isha").innerText=t.Isha

prayers=[
["Fajr",t.Fajr],
["Dhuhr",t.Dhuhr],
["Asr",t.Asr],
["Maghrib",t.Maghrib],
["Isha",t.Isha]
]

}

function calculateNext(){

let now=new Date()

for(let p of prayers){

let [h,m]=p[1].split(":")

let target=new Date()
target.setHours(h)
target.setMinutes(m)
target.setSeconds(0)

if(target>now){

nextPrayerTime=target
document.getElementById("nextname").innerText=p[0]
return

}

}

}

function updateCountdown(){

calculateNext()

if(!nextPrayerTime) return

let now=new Date()

let diff=nextPrayerTime-now

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60

document.getElementById("countdown").innerText =
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

loadTimes()

setInterval(updateCountdown,1000)

</script>

</body>
</html>
