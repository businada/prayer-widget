<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Edge Widget</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Segoe UI;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.container{
display:flex;
gap:120px;
}

.prayer{
text-align:center;
}

.name{
font-size:28px;
opacity:0.7;
}

.time{
font-size:60px;
font-weight:bold;
}

.next{
margin-top:80px;
text-align:center;
}

.countdown{
font-size:50px;
color:#00e5ff;
font-weight:bold;
}

.location{
position:absolute;
top:20px;
font-size:18px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="location">Dubai</div>

<div class="container">

<div class="prayer">
<div class="name">Fajr</div>
<div class="time" id="fajr">--</div>
</div>

<div class="prayer">
<div class="name">Dhuhr</div>
<div class="time" id="dhuhr">--</div>
</div>

<div class="prayer">
<div class="name">Asr</div>
<div class="time" id="asr">--</div>
</div>

<div class="prayer">
<div class="name">Maghrib</div>
<div class="time" id="maghrib">--</div>
</div>

<div class="prayer">
<div class="name">Isha</div>
<div class="time" id="isha">--</div>
</div>

</div>

<div class="next">
<div>Next Prayer</div>
<div id="nextname">--</div>
<div class="countdown" id="countdown">00:00:00</div>
</div>

<script>

let prayers=[]
let nextPrayerTime=null

function cleanTime(t){
return t.split(" ")[0]  // removes timezone text
}

function format(t){
let [h,m]=t.split(":")
let hour=parseInt(h)
let ampm=hour>=12?"PM":"AM"
hour=hour%12
hour=hour?hour:12
return hour+":"+m+" "+ampm
}

async function loadPrayerTimes(){

let res=await fetch("https://api.aladhan.com/v1/timings?latitude=25.2048&longitude=55.2708&method=4")
let data=await res.json()

let t=data.data.timings

let fajr=cleanTime(t.Fajr)
let dhuhr=cleanTime(t.Dhuhr)
let asr=cleanTime(t.Asr)
let maghrib=cleanTime(t.Maghrib)
let isha=cleanTime(t.Isha)

document.getElementById("fajr").innerText=format(fajr)
document.getElementById("dhuhr").innerText=format(dhuhr)
document.getElementById("asr").innerText=format(asr)
document.getElementById("maghrib").innerText=format(maghrib)
document.getElementById("isha").innerText=format(isha)

prayers=[
["Fajr",fajr],
["Dhuhr",dhuhr],
["Asr",asr],
["Maghrib",maghrib],
["Isha",isha]
]

calculateNextPrayer()

}

function calculateNextPrayer(){

let now=new Date()

for(let p of prayers){

let [h,m]=p[1].split(":")

let target=new Date()
target.setHours(h)
target.setMinutes(m)
target.setSeconds(0)

if(target>now){

nextPrayerTime=target
document.getElementById("nextname").innerText=p[0]
return

}

}

}

function updateCountdown(){

if(!nextPrayerTime) return

let now=new Date()
let diff=nextPrayerTime-now

if(diff<=0){
calculateNextPrayer()
return
}

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60

document.getElementById("countdown").innerText=
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

loadPrayerTimes()
setInterval(updateCountdown,1000)

</script>

</body>
</html>
