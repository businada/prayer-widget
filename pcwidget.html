<script>

let prayers=[]

function cleanTime(t){
return t.split(" ")[0]
}

function parseTime(t){
let [h,m]=t.split(":")
let d=new Date()
d.setHours(parseInt(h))
d.setMinutes(parseInt(m))
d.setSeconds(0)
return d
}

async function loadPrayerTimes(){

let res=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=4")
let data=await res.json()

let t=data.data.timings

let fajr=cleanTime(t.Fajr)
let sunrise=cleanTime(t.Sunrise)
let dhuhr=cleanTime(t.Dhuhr)
let asr=cleanTime(t.Asr)
let maghrib=cleanTime(t.Maghrib)
let isha=cleanTime(t.Isha)

document.getElementById("fajr").innerText=fajr
document.getElementById("sunrise").innerText=sunrise
document.getElementById("dhuhr").innerText=dhuhr
document.getElementById("asr").innerText=asr
document.getElementById("maghrib").innerText=maghrib
document.getElementById("isha").innerText=isha

prayers=[
["Fajr",parseTime(fajr)],
["Dhuhr",parseTime(dhuhr)],
["Asr",parseTime(asr)],
["Maghrib",parseTime(maghrib)],
["Isha",parseTime(isha)]
]

}

function updateCountdown(){

let now=new Date()

for(let p of prayers){

if(p[1]>now){

let diff=p[1]-now

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60

document.getElementById("nextprayer").innerText=p[0]

document.getElementById("countdown").innerText=
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

return

}

}

}

loadPrayerTimes()
setInterval(updateCountdown,1000)

</script>
