<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Prayer Edge Widget</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Segoe UI, Arial;
overflow:hidden;
}

.container{
width:1920px;
height:480px;
display:flex;
align-items:center;
justify-content:center;
gap:120px;
}

.prayer{
text-align:center;
}

.name{
font-size:42px;
opacity:0.7;
}

.time{
font-size:70px;
font-weight:bold;
}

.next{
position:absolute;
bottom:40px;
left:50%;
transform:translateX(-50%);
text-align:center;
}

.nextname{
font-size:32px;
opacity:0.8;
}

.countdown{
font-size:60px;
color:#00e5ff;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div class="prayer">
<div class="name">Fajr</div>
<div class="time" id="fajr">--</div>
</div>

<div class="prayer">
<div class="name">Dhuhr</div>
<div class="time" id="dhuhr">--</div>
</div>

<div class="prayer">
<div class="name">Asr</div>
<div class="time" id="asr">--</div>
</div>

<div class="prayer">
<div class="name">Maghrib</div>
<div class="time" id="maghrib">--</div>
</div>

<div class="prayer">
<div class="name">Isha</div>
<div class="time" id="isha">--</div>
</div>

</div>

<div class="next">
<div class="nextname">Next Prayer</div>
<div class="countdown" id="countdown">00:00:00</div>
</div>

<script>

let prayers={};

function format(t){
let [h,m]=t.split(":");
let hour=parseInt(h);
let ampm=hour>=12?"PM":"AM";
hour=hour%12;
hour=hour?hour:12;
return hour+":"+m+" "+ampm;
}

async function load(){

let res=await fetch("https://api.aladhan.com/v1/timingsByCity?city=Dubai&country=UAE&method=4");
let data=await res.json();

let t=data.data.timings;

prayers=t;

document.getElementById("fajr").innerText=format(t.Fajr);
document.getElementById("dhuhr").innerText=format(t.Dhuhr);
document.getElementById("asr").innerText=format(t.Asr);
document.getElementById("maghrib").innerText=format(t.Maghrib);
document.getElementById("isha").innerText=format(t.Isha);

}

function countdown(){

let now=new Date();

let prayerList=[
["Fajr",prayers.Fajr],
["Dhuhr",prayers.Dhuhr],
["Asr",prayers.Asr],
["Maghrib",prayers.Maghrib],
["Isha",prayers.Isha]
];

for(let p of prayerList){

let [h,m]=p[1].split(":");

let target=new Date();
target.setHours(h);
target.setMinutes(m);
target.setSeconds(0);

if(target>now){

let diff=target-now;

let hh=Math.floor(diff/1000/60/60);
let mm=Math.floor(diff/1000/60)%60;
let ss=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerText=
hh.toString().padStart(2,"0")+":"+
mm.toString().padStart(2,"0")+":"+
ss.toString().padStart(2,"0");

break;
}

}

}

load();
setInterval(countdown,1000);

</script>

</body>
</html>
