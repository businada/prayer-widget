<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dubai Prayer Dashboard</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Segoe UI;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.location{
position:absolute;
top:20px;
font-size:20px;
opacity:0.8;
}

.container{
display:flex;
gap:90px;
}

.prayer{
text-align:center;
}

.name{
font-size:26px;
opacity:0.7;
margin-bottom:6px;
}

.time{
font-size:60px;
font-weight:600;
}

.sunrise{
opacity:0.6;
}

.next{
position:absolute;
bottom:40px;
text-align:center;
}

.nextname{
font-size:24px;
opacity:0.7;
}

.countdown{
font-size:50px;
font-weight:bold;
color:#00e5ff;
margin-top:5px;
}

</style>

</head>

<body>

<div class="location">Dubai</div>

<div class="container">

<div class="prayer">
<div class="name">Fajr</div>
<div class="time" id="fajr">--</div>
</div>

<div class="prayer sunrise">
<div class="name">Sunrise</div>
<div class="time" id="sunrise">--</div>
</div>

<div class="prayer">
<div class="name">Dhuhr</div>
<div class="time" id="dhuhr">--</div>
</div>

<div class="prayer">
<div class="name">Asr</div>
<div class="time" id="asr">--</div>
</div>

<div class="prayer">
<div class="name">Maghrib</div>
<div class="time" id="maghrib">--</div>
</div>

<div class="prayer">
<div class="name">Isha</div>
<div class="time" id="isha">--</div>
</div>

</div>

<div class="next">
<div class="nextname">Next Prayer</div>
<div id="nextprayer">--</div>
<div class="countdown" id="countdown">00:00:00</div>
</div>

<script>

let prayers=[]
let nextPrayerTime=null

function parseTime(t){

let [h,m]=t.split(":")
let d=new Date()
d.setHours(parseInt(h))
d.setMinutes(parseInt(m))
d.setSeconds(0)

return d

}

async function loadTimes(){

let res=await fetch("dubai_prayer_times.json")
let data=await res.json()

let t=data.today

document.getElementById("fajr").innerText=t.Fajr
document.getElementById("sunrise").innerText=t.Sunrise
document.getElementById("dhuhr").innerText=t.Dhuhr
document.getElementById("asr").innerText=t.Asr
document.getElementById("maghrib").innerText=t.Maghrib
document.getElementById("isha").innerText=t.Isha

prayers=[
["Fajr",parseTime(t.Fajr)],
["Dhuhr",parseTime(t.Dhuhr)],
["Asr",parseTime(t.Asr)],
["Maghrib",parseTime(t.Maghrib)],
["Isha",parseTime(t.Isha)]
]

}

function updateNextPrayer(){

let now=new Date()

for(let p of prayers){

if(p[1]>now){

nextPrayerTime=p[1]
document.getElementById("nextprayer").innerText=p[0]
return

}

}

}

function updateCountdown(){

updateNextPrayer()

if(!nextPrayerTime) return

let now=new Date()
let diff=nextPrayerTime-now

let h=Math.floor(diff/1000/60/60)
let m=Math.floor(diff/1000/60)%60
let s=Math.floor(diff/1000)%60

document.getElementById("countdown").innerText =
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

loadTimes()

setInterval(updateCountdown,1000)

</script>

</body>
</html>
